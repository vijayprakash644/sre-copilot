version: "3.9"

# Production compose — extend docker-compose.yml with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - api
    restart: always

volumes:
  nginx_certs:
